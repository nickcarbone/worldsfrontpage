name: World's Front Page — Daily Pipeline

on:
  schedule:
    # 4:00 AM Eastern = 9:00 AM UTC
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Substack post)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUBSTACK_EMAIL:    ${{ secrets.SUBSTACK_EMAIL }}
          SUBSTACK_PASSWORD: ${{ secrets.SUBSTACK_PASSWORD }}
          SUBSTACK_PUB_URL:  "https://worldsfrontpage.substack.com"
          PYTHONPATH: src
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Upload daily log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-log-${{ github.run_id }}
          path: logs/*.json
          retention-days: 30
